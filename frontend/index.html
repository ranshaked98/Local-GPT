<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Local GPT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <span>💬 Local GPT</span>
    <div id="color-controls">
      <label>🌙 BG     <input type="color" id="pick-bg"     value="#1a1a2e" /></label>
      <label>🗂 Header <input type="color" id="pick-header" value="#16213e" /></label>
      <label>💬 Bubbles<input type="color" id="pick-bubble" value="#0f3460" /></label>
      <label>🔴 Button <input type="color" id="pick-btn"    value="#e94560" /></label>
      <button id="apply-colors-btn">✅ Apply</button>
    </div>
  </header>

  <div id="chat-box">
    <div class="message ai">
      <div class="model-tag">TAMIR SAN</div>
      Hello! How can I help you today?
    </div>
  </div>

  <div id="input-area">
    <input id="user-input" type="text" placeholder="Type a message..." autofocus />
    <button id="send-btn">Send</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
